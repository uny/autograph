name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for the emulator smoke below — an on-demand gate, deliberately not run on every PR.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# These independent chains run in parallel instead of adding their runtimes (~31 min previously).
# All require macOS for iosSimulatorArm64; Apple silicon runners execute its tests natively.

jobs:
  library:
    name: library
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Diagnostic only (see issue #23): linkDebugTestIosSimulatorArm64 intermittently fails
      # with "framework 'UIUtilities' not found" / undefined symbols, which looks like it
      # depends on which Xcode/SDK the runner resolves via `xcode-select` at build time. This
      # records that state so failures can be correlated against it.
      - name: Log active Xcode/SDK
        run: |
          xcode-select -p
          xcodebuild -version
          ls /Applications | grep -i '^Xcode'

      # Use `build` rather than `check` to cover device test sources and published artifacts.
      #
      # Skip sample framework assembly (~640s): CI cannot run the device frameworks, and sample-ios
      # below covers the simulator framework through Xcode's embed phase. Library artifacts, ABI
      # dumps, tests, and sample-shared Kotlin remain covered.
      #
      # The exclusion also removes autograph-compose's iosArm64 publication resources, so retain the
      # zip task used by cd.yml. The omitted `export*ApiElements` tasks are not part of publication.
      - name: Build and test all targets
        run: ./gradlew build -x :sample-shared:assemble :autograph-compose:iosArm64ZipMultiplatformResourcesForPublication --stacktrace

  swift-package:
    name: swift-package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # AutographSegmentSwift (root Package.swift) consumes Autograph.xcframework as a local
      # binaryTarget when present (see Package.swift), so it must be built before `xcodebuild test`
      # can link it.
      - name: Build Autograph.xcframework
        run: ./gradlew :autograph-apple:assembleAutographReleaseXCFramework --stacktrace

      - name: Test the Swift package (AutographSegmentSwift + AutographUI)
        run: |
          device=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | map(.value[] | select(.name | startswith("iPhone"))) | .[0].name')
          xcodebuild test -scheme Autograph-Package -destination "platform=iOS Simulator,name=$device"

  sample-ios:
    name: sample-ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # xcodebuild exercises sample-shared's embedAndSignAppleFrameworkForXcode path, which Gradle's
      # `build` does not. `test` also runs iosAppUITests for autocapture hit-testing behavior that
      # compose.uiTest cannot cover.
      - name: Test sample-ios
        run: |
          device=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | map(.value[] | select(.name | startswith("iPhone"))) | .[0].name')
          xcodebuild test -project sample-ios/iosApp.xcodeproj -scheme iosApp -destination "platform=iOS Simulator,name=$device"

  # On-demand only (workflow_dispatch): the Android on-device smoke for #65's native screen capture —
  # the coverage Robolectric cannot give (real framework, real windowing, a real back button). An
  # emulator job is slow and flaky, and autograph-android's Robolectric suite already covers the logic
  # on every PR, so this is a manual gate rather than a per-PR one. Runs on Linux (KVM) since the task
  # only needs the Android targets of its KMP dependencies, not the iOS ones.
  android-instrumented:
    name: android-instrumented
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run the native-screens instrumented smoke
        uses: reactivecircus/android-emulator-runner@c9c93e6ba9c4194322e114c40970d5983d9a07cc # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew :sample-android:connectedDebugAndroidTest
