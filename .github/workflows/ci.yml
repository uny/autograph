name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Three jobs rather than one, because the work splits into three chains that need nothing from each
# other, and the old single job paid for all of them back-to-back (~31 min). Wall-clock is now the
# slowest chain instead of their sum. They do duplicate some Kotlin/Native compilation — each job
# rebuilds the library klibs it needs — but that overlap is cheaper than running them in series, and
# macOS runners are free for public repositories.
#
# Every job needs macOS: iosSimulatorArm64 can only be compiled and tested there, and macos-latest is
# Apple silicon so the simulator tests execute natively.

jobs:
  library:
    name: library
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Diagnostic only (see issue #23): linkDebugTestIosSimulatorArm64 intermittently fails
      # with "framework 'UIUtilities' not found" / undefined symbols, which looks like it
      # depends on which Xcode/SDK the runner resolves via `xcode-select` at build time. This
      # records that state on every run so the next failure can be correlated against it. It lives
      # in this job because this is the job that runs that link task.
      - name: Log active Xcode/SDK
        run: |
          xcode-select -p
          xcodebuild -version
          ls /Applications | grep -i '^Xcode'

      # `build` (not `check`) so packaging is covered too: it additionally compiles the device-target
      # test sources and assembles the AARs / metadata jars that get published, none of which `check`
      # would touch.
      #
      # `-x :sample-shared:assemble` skips linking the sample app's iOS frameworks, which took ~640s
      # — half this step — for artifacts nothing here consumes: two are device (iosArm64) frameworks
      # CI can never run, and the third is a Release framework the sample's Debug test build ignores.
      # The library's own device klibs, its ABI dumps, and every test still build; sample-shared's
      # Kotlin still compiles (sample-android depends on it); and the sample-ios job below still
      # links its framework for real through Xcode's embed phase, so that path stays covered — it
      # just stops being paid for twice.
      #
      # The one thing that exclusion takes with it that isn't sample-shared's: autograph-compose's
      # iosArm64 publication resources, which `build` only ever reached through sample-shared's
      # iosArm64 chain rather than through `:autograph-compose:assemble`. cd.yml publishes them, so
      # naming the zip task explicitly (it pulls the copy task with it) keeps that path built here
      # instead of letting a break in it surface first at release time.
      - name: Build and test all targets
        run: ./gradlew build -x :sample-shared:assemble :autograph-compose:iosArm64ZipMultiplatformResourcesForPublication --stacktrace

  swift-package:
    name: swift-package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # AutographSegmentSwift (root Package.swift) consumes AutographSegment.xcframework as a
      # local binaryTarget when present (see Package.swift), so it must be built before
      # `xcodebuild test` can link it.
      - name: Build AutographSegment.xcframework
        run: ./gradlew :autograph-segment:assembleAutographSegmentReleaseXCFramework --stacktrace

      - name: Test AutographSegmentSwift
        run: |
          device=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | map(.value[] | select(.name | startswith("iPhone"))) | .[0].name')
          xcodebuild test -scheme AutographSegmentSwift -destination "platform=iOS Simulator,name=$device"

  sample-ios:
    name: sample-ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # sample-ios/iosApp embeds sample-shared's exported framework via a Run Script build phase
      # (`embedAndSignAppleFrameworkForXcode`, invoked from within the xcodebuild step itself, not
      # a separate Gradle task here) — building it end-to-end catches breakage in that embed path
      # that `./gradlew build` alone (which never invokes Xcode) can't. `test`, not just `build`,
      # also runs iosAppUITests: permanent on-device regression coverage for the iOS autocapture
      # resolver's hit-testing (correct-element attribution, autographIgnore/trackClick dedup) that
      # compose.uiTest can't provide — see its kdoc for why.
      - name: Test sample-ios
        run: |
          device=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | map(.value[] | select(.name | startswith("iPhone"))) | .[0].name')
          xcodebuild test -project sample-ios/iosApp.xcodeproj -scheme iosApp -destination "platform=iOS Simulator,name=$device"
