name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS is required: the iosSimulatorArm64 target can only be compiled and
    # tested on macOS, and macos-latest runs on Apple silicon so the simulator
    # tests execute natively. A single `./gradlew build` runs every target's
    # checks: jvmTest, androidHostTest, iosSimulatorArm64Test, and the Compose
    # module's tests.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build and test all targets
        # --no-build-cache: the Gradle build cache persisted across CI runs (via
        # setup-gradle's actions-cache restore) keys Kotlin/Native compile tasks
        # on source/config hashes only, not the runner's Xcode/iOS-SDK version.
        # macos-latest's Xcode version drifts over time, so a cached compile
        # output from an older Xcode can get relinked against a newer/older SDK
        # and fail with "symbol(s) not found" (see issue #23). Forcing a clean
        # compile+link every run trades some CI time for reproducibility.
        run: ./gradlew build --stacktrace --no-build-cache
