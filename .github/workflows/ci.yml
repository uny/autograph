name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS is required: the iosSimulatorArm64 target can only be compiled and
    # tested on macOS, and macos-latest runs on Apple silicon so the simulator
    # tests execute natively. A single `./gradlew build` runs every target's
    # checks: jvmTest, androidHostTest, iosSimulatorArm64Test, and the Compose
    # module's tests.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Diagnostic only (see issue #23): linkDebugTestIosSimulatorArm64 intermittently fails
      # with "framework 'UIUtilities' not found" / undefined symbols, which looks like it
      # depends on which Xcode/SDK the runner resolves via `xcode-select` at build time. This
      # records that state on every run so the next failure can be correlated against it.
      - name: Log active Xcode/SDK
        run: |
          xcode-select -p
          xcodebuild -version
          ls /Applications | grep -i '^Xcode'

      - name: Build and test all targets
        run: ./gradlew build --stacktrace

      # AutographSegmentSwift (root Package.swift) consumes AutographSegment.xcframework as a
      # local binaryTarget when present (see Package.swift), so it must be built before
      # `xcodebuild test` can link it.
      - name: Build AutographSegment.xcframework
        run: ./gradlew :autograph-segment:assembleAutographSegmentReleaseXCFramework --stacktrace

      - name: Test AutographSegmentSwift
        run: |
          device=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | map(.value[] | select(.name | startswith("iPhone"))) | .[0].name')
          xcodebuild test -scheme AutographSegmentSwift -destination "platform=iOS Simulator,name=$device"
