name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: macos-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral -Pversion=${{ steps.version.outputs.VERSION }} --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build Autograph.xcframework
        run: ./gradlew :autograph-apple:assembleAutographReleaseXCFramework --stacktrace

      # Kotlin/Native's build output isn't reproducible across separate builds — confirmed by
      # rebuilding the same source on the same machine and observing a different xcframework zip
      # checksum each time. So the checksum can only be known from *this exact* build, not
      # pre-computed and committed ahead of the tag. Self-correct: update Package.swift with the
      # checksum this build actually produced, commit it, and move the tag to point at that
      # commit — the same zip built above is what gets uploaded, so they can never disagree.
      - name: Publish Autograph.xcframework binary target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          zip_path="autograph-apple/build/XCFrameworks/release/Autograph.xcframework.zip"

          (cd autograph-apple/build/XCFrameworks/release && zip -ry Autograph.xcframework.zip Autograph.xcframework)
          checksum=$(swift package compute-checksum "$zip_path")

          sed -i '' -E "s/private let releaseVersion = \"[^\"]*\"/private let releaseVersion = \"$version\"/" Package.swift
          sed -i '' -E "s/private let releaseChecksum = \"[^\"]*\"/private let releaseChecksum = \"$checksum\"/" Package.swift

          if ! git diff --quiet -- Package.swift; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Package.swift
            git commit -m "chore: sync Autograph binary target checksum for $tag"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git push origin "HEAD:refs/tags/$tag" --force
          fi

          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --generate-notes
          gh release upload "$tag" "$zip_path" --clobber
