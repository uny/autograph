version: 2
updates:
  # Gradle dependencies (the Kotlin/AGP/AndroidX/Compose versions in gradle/libs.versions.toml).
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # A Kotlin bump usually needs its ecosystem bumped in lockstep; a single grouped PR keeps them
      # from landing half-applied and breaking the Kotlin/Native + Compose-compiler alignment.
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"

  # GitHub Actions used by the CI / CD / docs workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
